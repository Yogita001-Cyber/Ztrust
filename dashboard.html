<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ZTrust Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /* Base */
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    :root{
      --bg:#f2f2f2;
      --panel:#ffffff;
      --ink:#222;
      --muted:#666;
      --brand:#c69b6b;
      --brand-hover:#ad8355;
      --stroke:#eee;
      --note-head:#faf6f1;
      --shadow:0 4px 20px rgba(0,0,0,0.1);
      --radius-lg:20px;
      --radius-md:16px;
      --content-max:1200px;
      --header-h:64px;
      --gap:16px;
    }
    html, body { height:100%; }
    /* Prevent the entire page from scrolling; inner panes can scroll if needed */
    body { background-color:var(--bg); color:var(--ink); overflow:hidden; }

    /* Top header (fixed height to compute remaining viewport) */
    .dashboard-header {
      height:var(--header-h);
      margin:0 auto;
      width:95%; max-width:var(--content-max);
      display:flex; justify-content:space-between; align-items:center;
    }
    .welcome-message { font-size:20px; font-weight:bold; color:#665c43; }
    .logout-btn {
      background:var(--brand); color:#fff; border:none; border-radius:10px; padding:10px 20px; font-size:16px; font-weight:bold;
      cursor:pointer; box-shadow: 0 3px 12px rgba(0,0,0,0.10); transition: background-color .2s; text-decoration:none; display:inline-block;
    }
    .logout-btn:hover { background:var(--brand-hover); }
    .tile-link { text-decoration:none; color:inherit; display:block; }

    /* Viewport content area: fills remaining height and prevents page scroll */
    .page-wrap {
      height:calc(100% - var(--header-h));
      width:95%; max-width:var(--content-max); margin:0 auto;
      display:grid; grid-template-columns:1fr 380px; gap:20px; align-items:stretch;
      padding:12px 0 16px 0;
    }

    /* Left column: use a 3-row grid so tiles always fill the column height */
    .tiles {
      height:100%;
      display:grid;
      grid-template-rows: 1fr 1fr 1fr; /* three equal rows fill full column */
      gap:var(--gap);
      overflow:hidden; /* no internal scrollbar unless a tile overflows */
    }

    /* Each tile fills its row; contents are centered */
    .section {
      height:100%; /* occupy the full grid row height */
      background:#fff; border-radius:var(--radius-lg);
      box-shadow:var(--shadow);
      display:flex; align-items:center; justify-content:space-between;
      padding:18px 22px;
      transition: transform .3s ease; cursor:pointer;
      min-height:0; /* allow shrinking if viewport is short */
    }
    .section:hover { transform: translateY(-3px); }

    /* Make media/text scale slightly down so all three fit comfortably */
    .icon { width:110px; height:110px; object-fit:contain; }
    .text-group { text-align:left; max-width:600px; padding:0 8px; }
    .text-group h2 { font-size:20px; font-weight:600; margin-bottom:6px; color:#333; line-height:1.2; }
    .text-group p { font-size:14px; color:var(--muted); }
    .reversed { flex-direction: row-reverse; }

    /* Right column: Notice panel fills to bottom; header sticky; body scrolls if long */
    .notice {
      height:100%;
      background:#fff; border-radius:var(--radius-md); box-shadow:var(--shadow);
      display:flex; flex-direction:column; overflow:hidden;
    }
    .notice-header {
      padding:12px 14px; background:var(--note-head); border-bottom:1px solid var(--stroke);
      position:sticky; top:0; z-index:1;
    }
    .notice-header h3 { margin:0 0 10px 0; font-size:18px; color:#5b5140; }

    .notice-form { display:flex; gap:8px; align-items:flex-start; }
    /* Switched to textarea so Enter inserts newline, not submit */
    .notice-form textarea{
      flex:1;
      min-height:38px;
      max-height:160px;        /* keep header compact */
      padding:8px 12px;
      border:1px solid var(--stroke);
      border-radius:10px;
      font-size:14px;
      resize:vertical;         /* let user expand if needed */
      line-height:1.35;
      outline:none;
    }
    .notice-form button{
      height:38px; padding:0 14px; border:none; border-radius:10px; background:var(--brand); color:#fff; font-weight:600; cursor:pointer;
    }
    .notice-form button:hover{ background:var(--brand-hover); }

    .notice-body { padding:12px 14px; overflow:auto; }
    .notice-card {
      background:#fff; border:1px solid var(--stroke); border-radius:12px; padding:10px 12px; display:flex; gap:12px; align-items:flex-start;
    }
    .notice-card + .notice-card { margin-top:10px; }
    .notice-main { flex:1; min-width:0; }
    .notice-meta { font-size:12px; color:#888; margin-bottom:6px; }
    .notice-text { font-size:14px; color:#333; white-space:pre-wrap; word-wrap:break-word; }
    .notice-actions button{
      background:transparent; border:1px solid #e3ded6; color:#7a6f5d; border-radius:8px; padding:6px 10px; cursor:pointer;
    }
    .notice-actions button:hover{ background:#f7f3ee; }

    /* Responsive */
    @media (max-width:1100px){
      .page-wrap { grid-template-columns:1fr 320px; }
    }
    @media (max-width:900px){
      .page-wrap { grid-template-columns:1fr; }
      .notice { order:-1; } /* show notice above tiles on narrow screens */
      .tiles { grid-template-rows: auto; display:flex; flex-direction:column; }
      .section { padding:16px; flex-direction:column; text-align:center; }
      .reversed { flex-direction:column; }
      .icon { width:96px; height:96px; margin-bottom:8px; }
      .text-group { max-width:100%; padding:0; }
      .text-group h2 { font-size:18px; }
      .text-group p { font-size:13px; }
    }

    /* Optional subtle scrollbars for notice body */
    .notice-body::-webkit-scrollbar { width:10px; }
    .notice-body::-webkit-scrollbar-thumb { background:#d9d4cd; border-radius:10px; }
  </style>
</head>
<body>
  <div class="dashboard-header">
    <span class="welcome-message">
      Welcome, {{ user.name or user.email }}!
    </span>
    <a class="logout-btn" href="{{ url_for('logout') }}">Log Out</a>
  </div>

  <main class="page-wrap">
    <!-- LEFT: existing tiles (now equal-height, filling the column) -->
    <section class="tiles">
      <!-- File Sharing -->
      <a class="tile-link" href="{{ url_for('unlock_page', next='fileshare') }}">
        <div class="section">
          <img src="{{ url_for('static', filename='img/fileicon.png') }}" alt="File Icon" class="icon">
          <div class="text-group">
            <h2>Secure and Fast File Sharing</h2>
            <p>(Click to share files)</p>
          </div>
        </div>
      </a>

      <!-- Chat -->
      <a class="tile-link" href="{{ url_for('unlock_page', next='chat') }}">
        <div class="section reversed">
          <img src="{{ url_for('static', filename='img/chaticon.png') }}" alt="Chat Icon" class="icon">
          <div class="text-group">
            <h2>End-to-End Encrypted Chat</h2>
            <p>(Click to start messaging)</p>
          </div>
        </div>
      </a>

      <!-- SCPT Dashboard -->
      <a class="tile-link" href="{{ url_for('static', filename='dashboardscpt.html') }}">
        <div class="section">
          <img src="{{ url_for('static', filename='img/scpticon.png') }}" alt="SCPT Icon" class="icon">
          <div class="text-group">
            <h2>SCPT Dashboard</h2>
            <p>(Click to open SCPT tools)</p>
          </div>
        </div>
      </a>
    </section>

    <!-- RIGHT: Notice panel stretched to bottom -->
    <aside class="notice" aria-labelledby="notice-title">
      <div class="notice-header">
        <h3 id="notice-title">Notice for all</h3>
        <!-- Post new notice (visible to all for 6 hours; backend enforces TTL) -->
        <form class="notice-form" id="noticeForm" autocomplete="off">
          <!-- textarea so Enter inserts newline, not submit -->
          <textarea id="noticeInput"
                    rows="3"
                    maxlength="1000"
                    placeholder="Write a notice (Enter = new line; click Post to publish)..."
                    required></textarea>
          <button type="submit" title="Post (Ctrl/Cmd+Enter)">Post</button>
        </form>
      </div>
      <div class="notice-body" id="noticeList" aria-live="polite" aria-busy="false">
        <!-- Items injected by JS -->
      </div>
    </aside>
  </main>

  <!-- Notice board client logic (expects backend APIs to exist) -->
  <script>
    const API_LIST = "/api/notices";                 // GET -> [{id,text,author,author_email,created_at,can_delete}]
    const API_POST = "/api/notices";                 // POST JSON {text}
    const API_DELETE = (id) => `/api/notices/${id}`; // DELETE

    const POLL_MS = 10000; // 10s refresh

    const listEl = document.getElementById("noticeList");
    const formEl = document.getElementById("noticeForm");
    const inputEl = document.getElementById("noticeInput");

    // Time formatting pinned to IST
    const IST_TZ = "Asia/Kolkata";
    const timeFmt = new Intl.DateTimeFormat("en-GB", {
      timeZone: IST_TZ,
      day: "2-digit",
      month: "short",
      year: "numeric",
      hour: "2-digit",
      minute: "2-digit",
      hour12: true
    });
    function formatIST(iso){
      try { return timeFmt.format(new Date(iso)) + " IST"; }
      catch { return iso || ""; }
    }

    function el(tag, cls, text){
      const n = document.createElement(tag);
      if(cls) n.className = cls;
      if(text !== undefined) n.textContent = text;
      return n;
    }

    function makeCard(n){
      const wrap = el("article", "notice-card");
      const main = el("div", "notice-main");
      const meta = el("div", "notice-meta", `${n.author} • ${formatIST(n.created_at)}`);
      const body = el("div", "notice-text", n.text);
      main.appendChild(meta);
      main.appendChild(body);
      wrap.appendChild(main);

      if(n.can_delete){
        const actions = el("div", "notice-actions");
        const btn = el("button", null, "Delete");
        btn.addEventListener("click", async ()=>{
          btn.disabled = true;
          try{
            const res = await fetch(API_DELETE(n.id), { method:"DELETE" });
            if(!res.ok) throw new Error("delete failed");
            await loadNotices();
          }catch(e){
            alert("Delete failed. Please try again.");
          }finally{
            btn.disabled = false;
          }
        });
        actions.appendChild(btn);
        wrap.appendChild(actions);
      }
      return wrap;
    }

    async function loadNotices(){
      try{
        listEl.setAttribute("aria-busy","true");
        const res = await fetch(API_LIST, { headers:{ "Accept":"application/json" }, cache:"no-store" });
        if(!res.ok) throw new Error("load failed");
        const items = await res.json();
        listEl.innerHTML = "";
        items.forEach(n => listEl.appendChild(makeCard(n)));
      }catch(e){
        listEl.innerHTML = "<p class='notice-meta'>Unable to load notices right now.</p>";
      }finally{
        listEl.setAttribute("aria-busy","false");
      }
    }

    // Textarea behavior:
    // 1) Enter inserts newline (no submit)
    // 2) Ctrl/Cmd+Enter submits
    formEl.addEventListener("keydown", (e)=>{
      const isEnter = (e.key === "Enter");
      const isCtrlCmd = e.ctrlKey || e.metaKey;
      if(isEnter && !isCtrlCmd){
        e.preventDefault();
        const ta = inputEl;
        const start = ta.selectionStart ?? ta.value.length;
        const end = ta.selectionEnd ?? ta.value.length;
        ta.value = ta.value.slice(0, start) + "\n" + ta.value.slice(end);
        ta.selectionStart = ta.selectionEnd = start + 1;
      } else if (isEnter && isCtrlCmd){
        e.preventDefault();
        formEl.requestSubmit();
      }
    });

    formEl.addEventListener("submit", async (ev)=>{
      ev.preventDefault();
      const raw = inputEl.value || "";
      const text = raw.trim();
      if(!text) return;
      const btn = formEl.querySelector("button");
      btn.disabled = true;
      try{
        const res = await fetch(API_POST, {
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body: JSON.stringify({ text: raw }) // preserve line breaks
        });
        if(!res.ok) throw new Error("post failed");
        inputEl.value = "";
        await loadNotices();
        inputEl.focus();
      }catch(e){
        alert("Could not post notice. Please try again.");
      }finally{
        btn.disabled = false;
      }
    });

    // Initial load + polling
    loadNotices();
    setInterval(loadNotices, POLL_MS);
  </script>
</body>
</html>
